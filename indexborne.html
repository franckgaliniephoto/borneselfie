<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mes bornes à selfie — Gestion des locations</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --bg:#f5f4f1; --card:#ffffff; --ink:#292524; --muted:#78716c; --faint:#a8a29e;
    --line:#e7e5e4; --line2:#f5f5f4;
    --violet:#7C5CFC; --violet-dark:#6a4ae0; --violet-soft:#ede8ff;
    --teal:#0FA3A3; --amber:#E58A1F;
    --green:#16a34a; --red:#e11d48; --warn-bg:#fef3c7; --warn-ink:#92400e; --warn-line:#fcd34d;
    --dark:#1c1917;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5}
  .display{font-family:'Fraunces',Georgia,serif;font-weight:600}
  button{font-family:inherit;cursor:pointer;border:none;background:none;font-size:inherit;color:inherit}
  input,select,textarea{font-family:inherit;font-size:14px;width:100%;padding:8px 12px;border:1px solid #d6d3d1;border-radius:9px;background:#fff;color:var(--ink)}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--violet);box-shadow:0 0 0 3px rgba(124,92,252,.18)}
  input[type=checkbox]{width:16px;height:16px;accent-color:var(--violet);padding:0;flex:none}
  label.fld{display:flex;flex-direction:column;gap:4px}
  label.fld>span{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
  .hidden{display:none!important}

  /* ───── Connexion ───── */
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--dark);padding:16px}
  .login-card{background:#fff;border-radius:18px;padding:26px;width:100%;max-width:360px;box-shadow:0 20px 50px rgba(0,0,0,.4)}
  .login-head{display:flex;gap:12px;align-items:center;margin-bottom:18px}
  .logo{width:42px;height:42px;border-radius:12px;background:var(--violet);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;flex:none}
  .login-head small{color:var(--muted);font-size:12px;display:block}
  .btn{display:inline-flex;align-items:center;gap:7px;justify-content:center;background:var(--violet);color:#fff;font-weight:600;padding:9px 18px;border-radius:9px;transition:background .15s}
  .btn:hover{background:var(--violet-dark)}
  .btn:disabled{opacity:.5;cursor:default}
  .btn.ghost{background:#fff;color:var(--ink);border:1px solid #d6d3d1}
  .btn.ghost:hover{background:var(--line2)}
  .btn.danger{background:#fff;color:var(--red);border:1px solid #fecdd3}
  .btn.danger:hover{background:#fff1f2}
  .btn.block{width:100%}
  .login-err{margin-top:10px;color:var(--red);text-align:center;font-size:13px}

  /* ───── En-tête ───── */
  header{position:sticky;top:0;z-index:30;background:var(--dark);color:#e7e5e4}
  .head-in{max-width:1100px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;gap:12px}
  .head-in .logo{width:36px;height:36px;font-size:17px}
  .head-title{line-height:1.2}
  .head-title small{color:#a8a29e;font-size:11px}
  .head-actions{margin-left:auto;display:flex;gap:8px;align-items:center}
  .lockbtn{color:#a8a29e;padding:8px;border-radius:8px}
  .lockbtn:hover{background:#292524}
  nav{max-width:1100px;margin:0 auto;padding:0 16px;display:flex;gap:4px}
  nav button{padding:10px 12px;color:#a8a29e;border-bottom:2px solid transparent;font-size:13.5px;display:flex;align-items:center;gap:6px}
  nav button:hover{color:#e7e5e4}
  nav button.on{color:#fff;font-weight:600;border-color:var(--violet)}

  main{max-width:1100px;margin:0 auto;padding:22px 16px 60px}

  /* ───── Cartes & grilles ───── */
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
  .card h2{font-size:15px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .grid-dash{display:grid;gap:16px;grid-template-columns:1fr}
  @media(min-width:900px){.grid-dash{grid-template-columns:1fr 1fr 1fr}
    .span2{grid-column:span 2}.rowspan2{grid-row:span 2}}
  .grid2{display:grid;gap:12px;grid-template-columns:1fr}
  @media(min-width:560px){.grid2{grid-template-columns:1fr 1fr}.colspan2{grid-column:span 2}}
  .grid3{display:grid;gap:12px;grid-template-columns:1fr}
  @media(min-width:680px){.grid3{grid-template-columns:1fr 1fr 1fr}}

  .big{font-size:30px;font-weight:700;color:var(--dark)}
  .muted{color:var(--muted)}.faint{color:var(--faint)}.small{font-size:12px}
  .bar{height:8px;border-radius:99px;background:var(--line2);overflow:hidden;margin-top:8px}
  .bar>div{height:100%;border-radius:99px}

  /* ───── Pastilles & badges ───── */
  .dot{width:10px;height:10px;border-radius:99px;display:inline-block;flex:none}
  .dotlbl{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--muted)}
  .badge{display:inline-flex;align-items:center;gap:5px;border-radius:99px;padding:2px 9px;font-size:11.5px;font-weight:600;white-space:nowrap}
  .badge i{width:6px;height:6px;border-radius:99px;display:inline-block}
  .ok,.ko{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:600}
  .ok{color:var(--green)}.ko{color:var(--red)}

  /* ───── Listes ───── */
  .row-item{background:#fff;border:1px solid var(--line);border-radius:13px;padding:12px 14px;display:flex;flex-wrap:wrap;align-items:center;gap:8px 16px;margin-bottom:8px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
  .row-main{display:flex;flex-wrap:wrap;align-items:center;gap:6px 16px;flex:1;min-width:0;text-align:left}
  .row-main:hover .rname{text-decoration:underline}
  .rname{font-weight:600}
  .iconbtn{padding:8px;border-radius:8px;color:var(--muted)}
  .iconbtn:hover{background:var(--line2)}
  .iconbtn.del:hover{background:#fff1f2;color:var(--red)}
  .filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
  .filters input,.filters select{width:auto;min-width:150px}
  .filters .search{flex:1;min-width:200px}
  .empty{padding:40px;text-align:center;color:var(--muted);background:#fff;border:1px solid var(--line);border-radius:16px}

  .pending li button{width:100%;text-align:left;padding:7px 9px;border-radius:9px;display:flex;gap:8px;align-items:flex-start}
  .pending li button:hover{background:var(--line2)}
  .pending{list-style:none;max-height:380px;overflow-y:auto}
  .evt{width:100%;text-align:left;padding:11px 9px;display:flex;flex-wrap:wrap;gap:5px 14px;align-items:center;border-radius:10px;border-bottom:1px solid var(--line2)}
  .evt:hover{background:var(--line2)}

  /* ───── Calendrier ───── */
  .cal-grid{display:grid;gap:16px;grid-template-columns:1fr}
  @media(min-width:900px){.cal-grid{grid-template-columns:2fr 1fr}}
  .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .cal-head h2{font-size:17px;text-transform:capitalize;margin:0}
  .navbtn{padding:8px 10px;border-radius:9px;font-size:16px}
  .navbtn:hover{background:var(--line2)}
  .dow{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:11px;color:var(--faint);margin-bottom:4px}
  .days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .day{min-height:58px;border:1px solid var(--line2);border-radius:9px;padding:5px;display:flex;flex-direction:column;text-align:left;transition:border-color .12s;background:#fff}
  .day:hover{border-color:#d6d3d1}
  .day.today{border-color:var(--violet);background:var(--violet-soft)}
  .day .dn{font-size:11px;color:var(--muted)}
  .day.today .dn{color:var(--violet);font-weight:700}
  .day .strips{margin-top:auto;display:flex;gap:2px}
  .day .strips i{height:6px;border-radius:99px;flex:1}
  .legend{display:flex;gap:16px;margin-top:12px;flex-wrap:wrap}
  .dispo-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:13px}
  .linkish{color:var(--violet);font-weight:600;font-size:12px}
  .linkish:hover{text-decoration:underline}
  .day-rental{width:100%;text-align:left;border:1px solid var(--line);border-radius:10px;padding:9px;margin-top:8px}
  .day-rental:hover{background:var(--line2)}

  /* ───── Modales ───── */
  .overlay{position:fixed;inset:0;z-index:40;background:rgba(28,25,23,.55);display:flex;align-items:flex-end;justify-content:center;padding:0}
  @media(min-width:640px){.overlay{align-items:center;padding:18px}}
  .modal{background:#fff;width:100%;max-width:640px;max-height:92vh;overflow-y:auto;border-radius:18px 18px 0 0;box-shadow:0 25px 60px rgba(0,0,0,.35)}
  @media(min-width:640px){.modal{border-radius:18px}}
  .modal.wide{max-width:800px}
  .modal-head{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--line2);padding:13px 20px;display:flex;align-items:center;gap:12px;z-index:5}
  .modal-head h2{font-size:17px}
  .modal-head .x{margin-left:auto;padding:8px;border-radius:8px;color:var(--muted);font-size:16px}
  .modal-head .x:hover{background:var(--line2)}
  .modal-body{padding:18px 20px 22px}
  fieldset{border:none;margin-bottom:20px}
  legend{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:14px;margin-bottom:10px}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
  .chip{display:inline-flex;align-items:center;gap:8px;border:1.5px solid #d6d3d1;border-radius:99px;padding:7px 14px;font-weight:600;font-size:13px;color:var(--muted);background:#fff;transition:all .12s}
  .chip i{width:9px;height:9px;border-radius:99px;display:inline-block}
  .chip.on{color:#fff}
  .checkline{display:inline-flex;align-items:center;gap:8px;font-size:13.5px}
  .filelbl{display:inline-flex;align-items:center;gap:6px;color:var(--violet);font-weight:600;font-size:13px;cursor:pointer}
  .filelbl:hover{text-decoration:underline}
  .calcbox{background:var(--line2);border:1px solid var(--line);border-radius:12px;padding:12px;font-size:13px}
  .calcbox div{display:flex;justify-content:space-between;padding:2px 0}
  .calcbox .due{color:#b45309;border-top:1px solid var(--line);margin-top:4px;padding-top:6px;font-weight:600}
  .payrow{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:10px;padding:8px 12px;background:#fff}
  .payrow input[type=date]{width:auto;font-size:12px;padding:4px 8px}
  .payrow .checkline{flex:1}
  .alert{margin-top:12px;background:var(--warn-bg);border:1px solid var(--warn-line);color:var(--warn-ink);border-radius:12px;padding:12px;font-size:13px;display:flex;gap:10px}
  .alert ul{margin:6px 0 0 18px}
  .modal-foot{display:flex;justify-content:flex-end;gap:8px;padding-top:14px;border-top:1px solid var(--line2)}

  .vrow{display:flex;flex-wrap:wrap;gap:2px 14px;padding:9px 0;border-bottom:1px solid var(--line2);align-items:baseline}
  .vrow:last-child{border:none}
  .vrow>span:first-child{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);width:150px;flex:none}
  .vrow>div{flex:1;min-width:200px}

  /* ───── Toast ───── */
  #toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:60;background:var(--dark);color:#fff;padding:9px 18px;border-radius:10px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.3);opacity:0;pointer-events:none;transition:opacity .25s}
  #toast.show{opacity:1}
</style>
</head>
<body>

<!-- Connexion -->
<div id="login">
  <div class="login-card">
    <div class="login-head">
      <div class="logo">📸</div>
      <div>
        <div class="display" style="font-size:17px">Mes bornes à selfie</div>
        <small id="loginSub">Espace privé</small>
      </div>
    </div>
    <input type="password" id="pwd" placeholder="Mot de passe" style="margin-bottom:10px">
    <button class="btn block" id="loginBtn">Déverrouiller</button>
    <div class="login-err hidden" id="loginErr">Mot de passe incorrect</div>
  </div>
</div>

<!-- Application -->
<div id="app" class="hidden">
  <header>
    <div class="head-in">
      <div class="logo">📸</div>
      <div class="head-title">
        <div class="display" style="font-size:16px">Mes bornes à selfie</div>
        <small>Sphérik 1 · Sphérik 2 · Selfizee</small>
      </div>
      <div class="head-actions">
        <button class="btn" onclick="openForm()">＋ <span class="hide-sm">Nouvelle demande</span></button>
        <button class="lockbtn" title="Verrouiller" onclick="lock()">🔒</button>
      </div>
    </div>
    <nav>
      <button id="tab-dash" class="on" onclick="setTab('dash')">▦ Tableau de bord</button>
      <button id="tab-list" onclick="setTab('list')">☰ Locations</button>
      <button id="tab-cal" onclick="setTab('cal')">▤ Calendrier</button>
    </nav>
  </header>
  <main id="content"></main>
</div>

<!-- Modales -->
<div id="modalView" class="overlay hidden" onclick="if(event.target===this)closeView()"></div>
<div id="modalForm" class="overlay hidden" onclick="if(event.target===this)closeForm()"></div>
<div id="toast"></div>

<script>
/* ════════════════ Constantes ════════════════ */
const BORNES = [
  { id:"s1", nom:"Sphérik 1", color:"#7C5CFC" },
  { id:"s2", nom:"Sphérik 2", color:"#0FA3A3" },
  { id:"sz", nom:"Selfizee",  color:"#E58A1F" },
];
const STATUTS = [
  { id:"demande",   label:"Demande reçue",   color:"#64748B" },
  { id:"devis",     label:"Devis envoyé",    color:"#0EA5E9" },
  { id:"contrat",   label:"Contrat signé",   color:"#7C5CFC" },
  { id:"acompte",   label:"Acompte payé",    color:"#0FA3A3" },
  { id:"confirmee", label:"Confirmée",       color:"#16A34A" },
  { id:"encours",   label:"En cours",        color:"#E58A1F" },
  { id:"terminee",  label:"Terminée",        color:"#A16207" },
  { id:"galerie",   label:"Galerie envoyée", color:"#2563EB" },
  { id:"cloturee",  label:"Clôturée",        color:"#334155" },
  { id:"annulee",   label:"Annulée",         color:"#DC2626" },
];
const borne  = id => BORNES.find(b=>b.id===id);
const statut = id => STATUTS.find(s=>s.id===id) || STATUTS[0];
const STORE_KEY = "sbm:data:v1";
const MAX_FILE  = 3.5*1024*1024;

/* ════════════════ Stockage (Claude ou navigateur) ════════════════ */
const store = {
  async get(k){
    if (window.storage) { try { const r = await window.storage.get(k); return r ? r.value : null; } catch { return null; } }
    try { return localStorage.getItem(k); } catch { return null; }
  },
  async set(k,v){
    if (window.storage) { try { await window.storage.set(k,v); return true; } catch { return false; } }
    try { localStorage.setItem(k,v); return true; } catch { return false; }
  },
  async del(k){
    if (window.storage) { try { await window.storage.delete(k); } catch {} return; }
    try { localStorage.removeItem(k); } catch {}
  }
};

/* ════════════════ État ════════════════ */
let DB = { rentals:[], password:null };
let TAB = "dash";
let CAL = { y:new Date().getFullYear(), m:new Date().getMonth(), selDay:null, checkDate:"" };
let FILTERS = { q:"", statut:"", borne:"", sort:"date" };
let pendingFiles = {};   // fichiers du formulaire en attente { contrat:{key,dataUrl}, maquette:{...} }
let editingId = null;

/* ════════════════ Utilitaires ════════════════ */
const uid = () => Math.random().toString(36).slice(2,9)+Date.now().toString(36);
const esc = s => String(s==null?"":s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const eur = n => (isFinite(n)?n:0).toLocaleString("fr-FR",{style:"currency",currency:"EUR"});
const fmtDT = s => { if(!s)return"—"; const d=new Date(s); return isNaN(d)?"—":d.toLocaleDateString("fr-FR",{day:"2-digit",month:"short",year:"numeric"})+" · "+d.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}); };
const fmtD  = s => { if(!s)return"—"; const d=new Date(s); return isNaN(d)?"—":d.toLocaleDateString("fr-FR",{day:"2-digit",month:"short",year:"numeric"}); };

const acompteDe = r => {
  const t = parseFloat(r.montantTotal)||0;
  if (r.acompteMode==="fixe") return Math.min(parseFloat(r.montantAcompte)||0, t);
  const p = parseFloat(r.pctAcompte); return t*((isFinite(p)?p:30)/100);
};
const soldeDe  = r => Math.max((parseFloat(r.montantTotal)||0)-acompteDe(r),0);
const encaisse = r => (r.acomptePaye.done?acompteDe(r):0)+(r.soldePaye.done?soldeDe(r):0);
const actif    = r => r.statut!=="annulee";

const overlap = (a1,a2,b1,b2) => {
  const A1=new Date(a1),A2=new Date(a2||a1),B1=new Date(b1),B2=new Date(b2||b1);
  if([A1,A2,B1,B2].some(d=>isNaN(d)))return false;
  return A1<=B2 && B1<=A2;
};
const conflitsPour = (rental) => {
  if(!rental.dateDebut || !rental.bornes.length) return [];
  return DB.rentals.filter(r =>
    r.id!==rental.id && actif(r) && r.dateDebut &&
    r.bornes.some(b=>rental.bornes.includes(b)) &&
    overlap(rental.dateDebut,rental.dateFin,r.dateDebut,r.dateFin));
};

const emptyRental = () => ({
  id:uid(),
  client:{nom:"",prenom:"",email:"",telephone:""},
  bornes:[], statut:"demande",
  montantTotal:"", acompteMode:"pct", pctAcompte:"30", montantAcompte:"",
  acomptePaye:{done:false,date:""}, soldePaye:{done:false,date:""},
  contrat:{recu:false,fileName:"",fileKey:""},
  maquette:{perso:false,note:"",fileName:"",fileKey:""},
  typeRemise:"livraison", typeRetour:"livraison",
  dateDebut:"", dateFin:"", adresse:"",
  galerie:{envoyee:false,date:"",lien:""},
  notes:"", createdAt:new Date().toISOString()
});

const dotsHtml  = ids => ids.map(b=>`<span class="dot" style="background:${borne(b)?.color}"></span>`).join(" ");
const dotLbl    = id  => { const b=borne(id); return `<span class="dotlbl"><span class="dot" style="background:${b.color}"></span>${b.nom}</span>`; };
const badgeHtml = id  => { const s=statut(id); return `<span class="badge" style="background:${s.color}1c;color:${s.color}"><i style="background:${s.color}"></i>${s.label}</span>`; };
const okHtml    = (on,t)=> `<span class="${on?'ok':'ko'}">${on?'✓':'✗'} ${esc(t)}</span>`;

function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),3000); }

async function persist(){
  const ok = await store.set(STORE_KEY, JSON.stringify(DB));
  if(!ok) toast("⚠️ Échec de l'enregistrement des données");
}

/* ════════════════ Connexion ════════════════ */
async function init(){
  const raw = await store.get(STORE_KEY);
  if(raw){ try{ DB = JSON.parse(raw); }catch{} }
  DB.rentals = DB.rentals||[];
  const sub = document.getElementById("loginSub");
  const btn = document.getElementById("loginBtn");
  if(!DB.password){ sub.textContent="Première visite — choisissez un mot de passe"; btn.textContent="Créer mon espace"; }
  else { sub.textContent="Espace privé — saisissez votre mot de passe"; btn.textContent="Déverrouiller"; }
  document.getElementById("pwd").focus();
}
async function tryLogin(){
  const pwd = document.getElementById("pwd").value;
  if(!pwd) return;
  if(!DB.password){ DB.password=pwd; await persist(); unlock(); }
  else if(pwd===DB.password) unlock();
  else document.getElementById("loginErr").classList.remove("hidden");
}
function unlock(){
  document.getElementById("login").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  render();
}
function lock(){
  document.getElementById("pwd").value="";
  document.getElementById("loginErr").classList.add("hidden");
  document.getElementById("app").classList.add("hidden");
  document.getElementById("login").classList.remove("hidden");
  document.getElementById("pwd").focus();
}
document.getElementById("loginBtn").addEventListener("click",tryLogin);
document.getElementById("pwd").addEventListener("keydown",e=>{ if(e.key==="Enter")tryLogin(); });

/* ════════════════ Navigation ════════════════ */
function setTab(t){
  TAB=t;
  ["dash","list","cal"].forEach(x=>document.getElementById("tab-"+x).classList.toggle("on",x===t));
  render();
}
function render(){
  const c=document.getElementById("content");
  if(TAB==="dash") c.innerHTML=renderDash();
  else if(TAB==="list") c.innerHTML=renderList();
  else c.innerHTML=renderCal();
}

/* ════════════════ Tableau de bord ════════════════ */
function renderDash(){
  const now=new Date(); const today0=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const actifs=DB.rentals.filter(actif);

  const prochains=actifs.filter(r=>r.dateDebut && new Date(r.dateFin||r.dateDebut)>=today0)
    .sort((a,b)=>new Date(a.dateDebut)-new Date(b.dateDebut)).slice(0,6);

  const duMois=actifs.filter(r=>{ if(!r.dateDebut)return false; const d=new Date(r.dateDebut);
    return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth(); });
  const caTotal=duMois.reduce((s,r)=>s+(parseFloat(r.montantTotal)||0),0);
  const caEnc=duMois.reduce((s,r)=>s+encaisse(r),0);
  const pctEnc=caTotal?Math.min(caEnc/caTotal*100,100):0;

  const nJours=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const occ=BORNES.map(b=>{
    const days=new Set();
    actifs.filter(r=>r.bornes.includes(b.id)&&r.dateDebut).forEach(r=>{
      const d1=new Date(r.dateDebut),d2=new Date(r.dateFin||r.dateDebut);
      for(let d=new Date(d1.getFullYear(),d1.getMonth(),d1.getDate());d<=d2;d.setDate(d.getDate()+1))
        if(d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear())days.add(d.getDate());
    });
    return {...b,pct:Math.round(days.size/nJours*100),days:days.size};
  });

  const attente=[];
  actifs.filter(r=>r.statut!=="cloturee").forEach(r=>{
    const who=esc((r.client.prenom+" "+r.client.nom).trim()||"Client");
    if(!r.contrat.recu)attente.push({r,txt:`📄 Contrat non reçu — ${who}`});
    if(!r.acomptePaye.done&&parseFloat(r.montantTotal)>0)attente.push({r,txt:`💶 Acompte en attente (${eur(acompteDe(r))}) — ${who}`});
    if(r.acomptePaye.done&&!r.soldePaye.done&&parseFloat(r.montantTotal)>0)attente.push({r,txt:`💶 Solde dû (${eur(soldeDe(r))}) — ${who}`});
    if(!r.maquette.perso)attente.push({r,txt:`🎨 Maquette non personnalisée — ${who}`});
    if(r.dateFin&&new Date(r.dateFin)<now&&!r.galerie.envoyee)attente.push({r,txt:`🖼️ Galerie photo à envoyer — ${who}`});
  });

  const mois=now.toLocaleDateString("fr-FR",{month:"long",year:"numeric"});

  return `<div class="grid-dash">
    <section class="card">
      <h2 class="display" style="text-transform:capitalize">Chiffre d'affaires · ${mois}</h2>
      <div><span class="big">${eur(caEnc)}</span> <span class="muted small">encaissé</span></div>
      <div class="muted small">sur ${eur(caTotal)} — reste à encaisser <strong style="color:#b45309">${eur(Math.max(caTotal-caEnc,0))}</strong></div>
      <div class="bar"><div style="width:${pctEnc}%;background:var(--green)"></div></div>
      <div class="faint small" style="margin-top:8px">${duMois.length} événement(s) ce mois-ci</div>
    </section>

    <section class="card">
      <h2 class="display">Taux d'occupation du mois</h2>
      ${occ.map(b=>`<div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;margin-bottom:3px">${dotLbl(b.id)}
          <span style="font-weight:600;font-size:13px">${b.pct}% <span class="faint" style="font-weight:400">(${b.days} j)</span></span></div>
        <div class="bar" style="margin-top:0"><div style="width:${b.pct}%;background:${b.color}"></div></div>
      </div>`).join("")}
    </section>

    <section class="card rowspan2">
      <h2 class="display">⚠️ Actions en attente
        <span class="badge" style="margin-left:auto;background:var(--warn-bg);color:var(--warn-ink)">${attente.length}</span></h2>
      ${attente.length===0?`<p class="muted">Tout est à jour. 🎉</p>`:
        `<ul class="pending">${attente.map((a,i)=>`<li><button onclick="openView('${a.r.id}')">${a.txt}</button></li>`).join("")}</ul>`}
    </section>

    <section class="card span2">
      <h2 class="display">Prochains événements</h2>
      ${prochains.length===0?`<p class="muted">Aucun événement à venir. Créez une demande avec « Nouvelle demande ».</p>`:
        prochains.map(r=>`<button class="evt" onclick="openView('${r.id}')">
          ${dotsHtml(r.bornes)}
          <span class="rname">${esc(r.client.prenom)} ${esc(r.client.nom)}</span>
          ${badgeHtml(r.statut)}
          <span class="muted small">🚚 ${fmtDT(r.dateDebut)} → ${fmtDT(r.dateFin)}</span>
          ${r.adresse?`<span class="muted small">📍 ${esc(r.adresse)}</span>`:""}
        </button>`).join("")}
    </section>
  </div>`;
}

/* ════════════════ Liste des locations ════════════════ */
function setFilter(k,v){ FILTERS[k]=v; render(); }
function renderList(){
  let rows=[...DB.rentals];
  if(FILTERS.q){ const s=FILTERS.q.toLowerCase();
    rows=rows.filter(x=>(x.client.prenom+" "+x.client.nom+" "+x.client.email).toLowerCase().includes(s)); }
  if(FILTERS.statut)rows=rows.filter(x=>x.statut===FILTERS.statut);
  if(FILTERS.borne)rows=rows.filter(x=>x.bornes.includes(FILTERS.borne));
  const cmp={
    date:(a,b)=>new Date(a.dateDebut||"2999")-new Date(b.dateDebut||"2999"),
    client:(a,b)=>(a.client.nom||"").localeCompare(b.client.nom||""),
    statut:(a,b)=>STATUTS.findIndex(s=>s.id===a.statut)-STATUTS.findIndex(s=>s.id===b.statut),
    montant:(a,b)=>(parseFloat(b.montantTotal)||0)-(parseFloat(a.montantTotal)||0),
  }[FILTERS.sort];
  rows.sort(cmp);

  return `<div class="filters">
      <input class="search" placeholder="🔍 Rechercher un client…" value="${esc(FILTERS.q)}"
        oninput="setFilter('q',this.value)">
      <select onchange="setFilter('statut',this.value)">
        <option value="">Tous les statuts</option>
        ${STATUTS.map(s=>`<option value="${s.id}" ${FILTERS.statut===s.id?"selected":""}>${s.label}</option>`).join("")}
      </select>
      <select onchange="setFilter('borne',this.value)">
        <option value="">Toutes les bornes</option>
        ${BORNES.map(b=>`<option value="${b.id}" ${FILTERS.borne===b.id?"selected":""}>${b.nom}</option>`).join("")}
      </select>
      <select onchange="setFilter('sort',this.value)">
        <option value="date" ${FILTERS.sort==="date"?"selected":""}>Trier par date</option>
        <option value="client" ${FILTERS.sort==="client"?"selected":""}>Trier par client</option>
        <option value="statut" ${FILTERS.sort==="statut"?"selected":""}>Trier par statut</option>
        <option value="montant" ${FILTERS.sort==="montant"?"selected":""}>Trier par montant</option>
      </select>
    </div>
    ${rows.length===0?`<div class="empty">Aucune location ne correspond. Créez-en une avec « Nouvelle demande ».</div>`:
      rows.map(r=>`<div class="row-item">
        <button class="row-main" onclick="openView('${r.id}')">
          ${dotsHtml(r.bornes)}
          <span><span class="rname">${esc(r.client.prenom)} ${esc(r.client.nom)}</span><br>
            <span class="faint small">${fmtD(r.dateDebut)} → ${fmtD(r.dateFin)}</span></span>
          ${badgeHtml(r.statut)}
          <strong>${eur(parseFloat(r.montantTotal)||0)}</strong>
          <span style="display:flex;flex-wrap:wrap;gap:4px 12px">
            ${okHtml(r.contrat.recu,"Contrat")}
            ${okHtml(r.acomptePaye.done,"Acompte")}
            ${okHtml(r.soldePaye.done,"Solde")}
            ${okHtml(r.maquette.perso,"Maquette")}
            ${okHtml(r.galerie.envoyee,"Galerie")}
          </span>
        </button>
        <span style="margin-left:auto;display:flex">
          <button class="iconbtn" title="Modifier" onclick="openForm('${r.id}')">✏️</button>
          <button class="iconbtn del" title="Supprimer" onclick="deleteRental('${r.id}')">🗑️</button>
        </span>
      </div>`).join("")}`;
}

/* ════════════════ Calendrier ════════════════ */
function calMove(d){ const m=CAL.m+d; CAL.y+=Math.floor(m/12); CAL.m=((m%12)+12)%12; CAL.selDay=null; render(); }
function calSelect(day){ CAL.selDay=day; render(); }
function calCheck(v){ CAL.checkDate=v; render(); }

function rentalsOnDay(y,m,day){
  const d0=new Date(y,m,day,0,0), d1=new Date(y,m,day,23,59);
  return DB.rentals.filter(r=>actif(r)&&r.dateDebut&&overlap(r.dateDebut,r.dateFin,d0,d1));
}

function renderCal(){
  const today=new Date();
  const first=new Date(CAL.y,CAL.m,1);
  const off=(first.getDay()+6)%7;
  const nDays=new Date(CAL.y,CAL.m+1,0).getDate();
  const moisLabel=first.toLocaleDateString("fr-FR",{month:"long",year:"numeric"});

  let cells="";
  for(let i=0;i<off;i++)cells+="<div></div>";
  for(let d=1;d<=nDays;d++){
    const list=rentalsOnDay(CAL.y,CAL.m,d);
    const bj=[...new Set(list.flatMap(r=>r.bornes))];
    const isToday=today.getDate()===d&&today.getMonth()===CAL.m&&today.getFullYear()===CAL.y;
    cells+=`<button class="day ${isToday?"today":""}" onclick="calSelect(${d})">
      <span class="dn">${d}</span>
      <span class="strips">${bj.map(b=>`<i style="background:${borne(b)?.color}"></i>`).join("")}</span>
    </button>`;
  }

  let dispoHtml="";
  if(CAL.checkDate){
    const d0=new Date(CAL.checkDate+"T00:00"),d1=new Date(CAL.checkDate+"T23:59");
    dispoHtml=BORNES.map(b=>{
      const busy=DB.rentals.find(r=>actif(r)&&r.dateDebut&&r.bornes.includes(b.id)&&overlap(r.dateDebut,r.dateFin,d0,d1));
      return `<div class="dispo-row">${dotLbl(b.id)}
        ${busy?`<button class="linkish" style="color:var(--red)" onclick="openView('${busy.id}')">Réservée — ${esc(busy.client.prenom)} ${esc(busy.client.nom)}</button>`
              :`<span class="ok">Disponible ✓</span>`}</div>`;
    }).join("");
  }

  let selHtml=`<p class="muted">Touchez un jour du calendrier pour voir les réservations.</p>`;
  if(CAL.selDay){
    const list=rentalsOnDay(CAL.y,CAL.m,CAL.selDay);
    selHtml=list.length===0?`<p class="ok">Toutes les bornes sont disponibles ce jour-là.</p>`:
      list.map(r=>`<button class="day-rental" onclick="openView('${r.id}')">
        <span style="display:flex;gap:8px;align-items:center;font-weight:600">${dotsHtml(r.bornes)} ${esc(r.client.prenom)} ${esc(r.client.nom)}</span>
        <span class="faint small">${fmtDT(r.dateDebut)} → ${fmtDT(r.dateFin)}</span>
      </button>`).join("");
  }

  return `<div class="cal-grid">
    <div class="card">
      <div class="cal-head">
        <button class="navbtn" onclick="calMove(-1)">‹</button>
        <h2 class="display">${moisLabel}</h2>
        <button class="navbtn" onclick="calMove(1)">›</button>
      </div>
      <div class="dow"><div>Lun</div><div>Mar</div><div>Mer</div><div>Jeu</div><div>Ven</div><div>Sam</div><div>Dim</div></div>
      <div class="days">${cells}</div>
      <div class="legend">${BORNES.map(b=>dotLbl(b.id)).join("")}</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:16px">
      <div class="card">
        <h2 class="display">Quelles bornes sont libres ?</h2>
        <input type="date" value="${CAL.checkDate}" onchange="calCheck(this.value)">
        ${dispoHtml?`<div style="margin-top:10px">${dispoHtml}</div>`:""}
      </div>
      <div class="card">
        <h2 class="display">${CAL.selDay?`Le ${CAL.selDay} ${moisLabel}`:"Sélectionnez un jour"}</h2>
        ${selHtml}
      </div>
    </div>
  </div>`;
}

        · Reste à payer : <strong style="color:#b45309">${eur(reste)}</strong></div></div>

        ${okHtml(r.contrat.recu, r.contrat.recu?"reçu":"en attente")}
        ${r.contrat.fileKey?` <button class="linkish" onclick="downloadFile('${r.contrat.fileKey}','${esc(r.contrat.fileName)}')">⬇ ${esc(r.contrat.fileName)||"Télécharger"}</button>`:""}</div></div>
      <div class="vrow"><span>Maquette</span><div>
        ${okHtml(r.maquette.perso, r.maquette.perso?"personnalisée":"non personnalisée")}
        ${r.maquette.note?`<div class="faint small">${esc(r.maquette.note)}</div>`:""}
        ${r.maquette.fileKey?` <button class="linkish" onclick="downloadFile('${r.maquette.fileKey}','${esc(r.maquette.fileName)}')">⬇ ${esc(r.maquette.fileName)||"Télécharger"}</button>`:""}</div></div>
      <div class="vrow"><span>Galerie photo</span><div>
        ${okHtml(r.galerie.envoyee, r.galerie.envoyee?`envoyée le ${fmtD(r.galerie.date)}`:"non envoyée")}
        ${r.galerie.lien?` <a class="linkish" href="${esc(r.galerie.lien)}" target="_blank" rel="noreferrer">🔗 Ouvrir la galerie</a>`:""}</div></div>
      ${r.notes?`<div class="vrow"><span>Notes</span><div>${esc(r.notes)}</div></div>`:""}
      <div class="modal-foot">
        <button class="btn danger" onclick="deleteRental('${r.id}')">🗑️ Supprimer</button>
        <button class="btn" onclick="closeView();openForm('${r.id}')">✏️ Modifier</button>
      </div>
    </div>
  </div>`;
  m.classList.remove("hidden");
}
function closeView(){ document.getElementById("modalView").classList.add("hidden"); }

async function downloadFile(key,name){
  const v=await store.get(key);
  if(!v){ alert("Fichier introuvable dans le stockage."); return; }
  const a=document.createElement("a"); a.href=v; a.download=name||"fichier"; a.click();
}

async function deleteRental(id){
  const r=DB.rentals.find(x=>x.id===id); if(!r)return;
  if(!confirm(`Supprimer la location de ${r.client.prenom} ${r.client.nom} ?`))return;
  for(const k of [r.contrat.fileKey,r.maquette.fileKey]) if(k) await store.del(k);
  DB.rentals=DB.rentals.filter(x=>x.id!==id);
  await persist(); closeView(); render(); toast("Location supprimée");
}

            onchange="autoDate(this,'f_gdate')"> Galerie envoyée au client</label>
          <label class="fld"><span>Date d'envoi</span><input type="date" id="f_gdate" value="${esc(r.galerie.date)}"></label>
          <label class="fld"><span>Lien de la galerie (optionnel)</span><input type="url" id="f_glien" placeholder="https://…" value="${esc(r.galerie.lien)}"></label>
        </div>
      </fieldset>

      <label class="fld"><span>Notes internes</span><textarea id="f_notes" rows="3">${esc(r.notes)}</textarea></label>

      <div class="modal-foot" style="margin-top:16px">
        <button class="btn ghost" onclick="closeForm()">Annuler</button>
        <button class="btn" id="f_save" onclick="saveForm()">Enregistrer</button>
      </div>
    </div>
  </div>`;
  m.classList.remove("hidden");
  recalc(); checkConflicts();
}
function closeForm(){ document.getElementById("modalForm").classList.add("hidden"); }

function toggleBorne(id,btn){
  const d=window._draft;
  if(d.bornes.includes(id)){ d.bornes=d.bornes.filter(b=>b!==id); btn.classList.remove("on"); btn.style.background=""; btn.style.borderColor=""; btn.querySelector("i").style.background=borne(id).color; }
  else{ d.bornes.push(id); btn.classList.add("on"); btn.style.background=borne(id).color; btn.style.borderColor=borne(id).color; btn.querySelector("i").style.background="#fff"; }
  checkConflicts();
}
function autoDate(cb,dateId){
  const inp=document.getElementById(dateId);
  if(cb.checked && !inp.value) inp.value=new Date().toISOString().slice(0,10);
}
function draftFromForm(){
  const d=window._draft;
  const g=id=>document.getElementById(id);
  return {...d,
    client:{prenom:g("f_prenom").value,nom:g("f_nom").value,email:g("f_email").value,telephone:g("f_tel").value},
    statut:g("f_statut").value,
    dateDebut:g("f_debut").value, dateFin:g("f_fin").value,
    typeRemise:g("f_remise").value, typeRetour:g("f_retour").value,
    adresse:g("f_adresse").value,
    montantTotal:g("f_total").value,
    acompteMode:g("f_amode").value,
    pctAcompte:g("f_amode").value==="pct"?g("f_aval").value:d.pctAcompte,
    montantAcompte:g("f_amode").value==="fixe"?g("f_aval").value:d.montantAcompte,
    acomptePaye:{done:g("f_apaye").checked,date:g("f_adate").value},
    soldePaye:{done:g("f_spaye").checked,date:g("f_sdate").value},
    contrat:{...d.contrat,recu:g("f_crecu").checked},
    maquette:{...d.maquette,perso:g("f_mperso").checked,note:g("f_mnote").value},
    galerie:{envoyee:g("f_genv").checked,date:g("f_gdate").value,lien:g("f_glien").value},
    notes:g("f_notes").value
  };
}
function recalc(){
  const r=draftFromForm();
  const total=parseFloat(r.montantTotal)||0;
  document.getElementById("f_calc").innerHTML=
    `<div><span class="muted">Acompte</span><strong>${eur(acompteDe(r))}</strong></div>
     <div><span class="muted">Solde restant dû</span><strong>${eur(soldeDe(r))}</strong></div>
     <div class="due"><span>Reste à payer</span><strong>${eur(Math.max(total-encaisse(r),0))}</strong></div>`;
}
function checkConflicts(){
  const r=draftFromForm();
  const conflits=conflitsPour(r);
  const box=document.getElementById("f_conflits");
  if(!conflits.length){ box.innerHTML=""; return; }
  box.innerHTML=`<div class="alert">⚠️<div><strong>Conflit de réservation !</strong> Sur cette période, la ou les bornes sélectionnées sont déjà réservées :
    <ul>${conflits.map(c=>`<li>${esc(c.client.prenom)} ${esc(c.client.nom)} — ${c.bornes.filter(b=>r.bornes.includes(b)).map(b=>borne(b).nom).join(", ")} — ${fmtDT(c.dateDebut)} → ${fmtDT(c.dateFin)}</li>`).join("")}</ul>
  </div></div>`;
}
function handleFile(input,kind){
  const f=input.files && input.files[0]; if(!f)return;
  const d=window._draft;
  const nameSpan=document.getElementById(kind==="contrat"?"f_cname":"f_mname");
  if(f.size>MAX_FILE){
    toast("Fichier trop volumineux (max ~3,5 Mo). Seul le nom sera enregistré.");
    d[kind].fileName=f.name; d[kind].fileKey=""; nameSpan.textContent=f.name; return;
  }
  const reader=new FileReader();
  reader.onload=()=>{
    const key=`sbm:file:${d.id}:${kind}`;
    pendingFiles[kind]={key,dataUrl:reader.result};
    d[kind].fileName=f.name; d[kind].fileKey=key;
    if(kind==="contrat"){ d.contrat.recu=true; document.getElementById("f_crecu").checked=true; }
    nameSpan.textContent=f.name;
  };
  reader.readAsDataURL(f);
}
async function saveForm(){
  const r=draftFromForm();
  if(!r.client.nom && !r.client.prenom){ toast("Indiquez au moins le nom du client."); return; }
  if(!r.bornes.length){ toast("Sélectionnez au moins une borne."); return; }
  const btn=document.getElementById("f_save"); btn.disabled=true; btn.textContent="Enregistrement…";
  for(const kind of ["contrat","maquette"]){
    const pf=pendingFiles[kind];
    if(pf){ const ok=await store.set(pf.key,pf.dataUrl); if(!ok)toast("⚠️ Échec de l'upload du fichier "+kind); }
  }
  const exists=DB.rentals.some(x=>x.id===r.id);
  DB.rentals=exists?DB.rentals.map(x=>x.id===r.id?r:x):[...DB.rentals,r];
  await persist();
  closeForm(); render(); toast(exists?"Location mise à jour":"Location créée");
}

/* ════════════════ Démarrage ════════════════ */
init();
</script>
</body>
</html>
